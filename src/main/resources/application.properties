# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# Security Configuration
# spring.autoconfigure.exclude = org.springframework.boot.autoconfigure.security.servlet.securityAutoConfiguration

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.flywaydb=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.storyai.storytelling_backend=INFO

# Jackson Configuration for LocalDateTime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Application Configuration
spring.application.name=storytelling-backend


# JWT Configuration (shared across JwtUtil and JwtService)
app.jwt.secret = ${JWT_SECRET}
app.jwt.expiration = ${JWT_EXPIRATION:86400}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.tryItOutEnabled=true

# Enable/Disable Swagger UI (disable in production via SPRINGDOC_SWAGGER_UI_ENABLED=false)
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

# AI Provider
ai.provider=openai

# OpenAI
ai.openai.api-key= ${OPENAI_API_KEY}
ai.openai.model=${OPENAI_MODEL:gpt-4}
ai.openai.max-tokens=${OPENAI_MAX_TOKENS:1000}
ai.openai.temperature=${OPENAI_TEMPERATURE:0.7}

# Claude
ai.claude.api-key= ${CLAUDE_API_KEY}
ai.claude.model=${CLAUDE_MODEL:claude-sonnet-4-5-20250929}
ai.claude.max-tokens=${CLAUDE_MAX_TOKENS:2000}
ai.claude.temperature=${CLAUDE_TEMPERATURE:0.7}

# Cache
ai.cache.enabled=${AI_CACHE_ENABLED:true}
ai.cache.expiration.hours=${AI_CACHE_EXPIRATION_HOURS:168}

# SCHEDULED TASKS
# Cron expression for cache cleanup (daily at 3 AM)
ai.cache.cleanup.cron=0 0 3 * * ?


# Gmail SMTP Email Configuration
email.enabled=${EMAIL_ENABLED:true}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${GMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${EMAIL_FROM:noreply@storytellingapp.com}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Email Testing (set to false to use mock email service)
email.test.enabled=${EMAIL_TEST_ENABLED:false}
